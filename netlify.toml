# Netlify build config for the TorenOne web app (Next.js 16, in web/).
#
# This file lives at the REPO ROOT. `base = "web"` tells Netlify the app is in the web/
# subdirectory: it installs deps from web/package-lock.json and runs the build there.
# In netlify.toml, paths are resolved relative to `base`, so `publish = ".next"` means
# web/.next — the Next build output the @netlify/plugin-nextjs runtime needs. Setting it
# here (config) overrides any stale "Publish directory" left in the Netlify UI, which
# otherwise defaults to the base dir and breaks the build ("publish == base").
#
# The engineering service (FastAPI) is NOT deployed here — it runs on Fly.io. See
# docs/GO_LIVE.md.

[build]
  base = "web"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"
