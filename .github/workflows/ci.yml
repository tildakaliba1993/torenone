name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Kernel + tools (lint, types, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Type-check (kernel)
        run: mypy kernel/src tools
      - name: Tests + coverage gate
        # Kernel coverage gate ramps to 95% as Phase 1 lands (PRD NFR-7).
        run: pytest --cov=torenone_kernel --cov-report=term-missing --cov-fail-under=0

  web:
    name: Web (lint, types, unit tests, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      # Playwright E2E runs from Phase 7 (needs browser binaries: npx playwright install --with-deps).
