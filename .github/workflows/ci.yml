name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Kernel + service (lint, types, tests)
    runs-on: ubuntu-latest
    # Postgres service so the behavioural RLS isolation test (Task 5.4) runs for real,
    # not just skipped. The test connects via DATABASE_URL and is a no-op without it.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,service]"
      - name: Lint
        run: ruff check .
      - name: Type-check (kernel + service)
        run: mypy kernel/src tools service/src
      - name: Tests + coverage gate
        # Kernel coverage gate ramps to 95% as Phase 1 lands (PRD NFR-7).
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: pytest --cov=torenone_kernel --cov-report=term-missing --cov-fail-under=0

  docker:
    name: Docker image (build + health smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build image
        run: docker build -t torenone-service:ci .
      - name: Run container
        run: docker run -d --name torenone -p 8000:8000 torenone-service:ci
      - name: Wait for /health and assert response
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health -o /tmp/health.json; then
              break
            fi
            sleep 2
          done
          echo "health body:"; cat /tmp/health.json; echo
          grep -q '"status":"ok"' /tmp/health.json
          grep -q 'torenone-engineering-service' /tmp/health.json
      - name: Container logs
        if: always()
        run: docker logs torenone || true
      - name: Cleanup
        if: always()
        run: docker rm -f torenone || true

  web:
    name: Web (lint, types, unit tests, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      # Playwright E2E runs from Phase 7 (needs browser binaries: npx playwright install --with-deps).
