name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:        # manual trigger (e.g. to run the opt-in E2E suite on demand)
  schedule:
    - cron: "0 2 * * *"     # nightly 02:00 UTC — runs the opt-in E2E suite (if enabled)

jobs:
  python:
    name: Kernel + service (lint, types, tests)
    runs-on: ubuntu-latest
    # Postgres service so the behavioural RLS isolation test (Task 5.4) runs for real,
    # not just skipped. The test connects via DATABASE_URL and is a no-op without it.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,service]"
      - name: Lint
        run: ruff check .
      - name: Type-check (kernel + service)
        run: mypy kernel/src tools service/src
      - name: Tests + coverage gate
        # Kernel coverage gate enforced at 95% (PRD NFR-7); currently ~98%.
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: pytest --cov=torenone_kernel --cov-report=term-missing --cov-fail-under=95

  docker:
    name: Docker image (build + health smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build image
        run: docker build -t torenone-service:ci .
      - name: Run container
        run: docker run -d --name torenone -p 8000:8000 torenone-service:ci
      - name: Wait for /health and assert response
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health -o /tmp/health.json; then
              break
            fi
            sleep 2
          done
          echo "health body:"; cat /tmp/health.json; echo
          grep -q '"status":"ok"' /tmp/health.json
          grep -q 'torenone-engineering-service' /tmp/health.json
      - name: Container logs
        if: always()
        run: docker logs torenone || true
      - name: Cleanup
        if: always()
        run: docker rm -f torenone || true

  web:
    name: Web (lint, types, unit tests, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  web-e2e:
    name: Web E2E (Playwright)
    runs-on: ubuntu-latest
    # OPT-IN + LOW-CADENCE. The suite signs in and writes real data (projects, runs,
    # a fresh firm-B user per run), so it must point at a SEPARATE Supabase TEST
    # project — never production. To keep that data churn off every push, it runs ONLY
    # on the nightly schedule and on manual dispatch (never on push/PR), and only when
    # the repo variable RUN_E2E=true is set with the secrets below.
    #   Secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, SUPABASE_DB_URL,
    #            NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY,
    #            E2E_EMAIL, E2E_PASSWORD (a pre-seeded user; email confirmation off).
    if: >-
      vars.RUN_E2E == 'true' &&
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v5
      # The engineering service serves /design (kernel + PDF). /parse is mocked in
      # the browser, so no OpenAI key is needed here.
      - name: Build service image
        run: docker build -t torenone-service:ci .
      - name: Run service
        run: |
          docker run -d --name torenone -p 8000:8000 \
            -e SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            -e SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -e SUPABASE_DB_URL="${{ secrets.SUPABASE_DB_URL }}" \
            -e CORS_ALLOW_ORIGINS="http://localhost:3000" \
            torenone-service:ci
      - name: Wait for service health
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8000/health && break
            sleep 2
          done
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install web deps
        working-directory: web
        run: npm ci
      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_ENGINEERING_SERVICE_URL: http://localhost:8000
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: npm run e2e
      - name: Service logs
        if: always()
        run: docker logs torenone || true
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          if-no-files-found: ignore
          retention-days: 7
      - name: Cleanup
        if: always()
        run: docker rm -f torenone || true
