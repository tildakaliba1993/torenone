name: Deploy service

# Production-Readiness §3.5 — repeatable, auditable release automation for the
# engineering service (Fly.io).
#
# The WEB app is deployed by **Netlify**, which builds + publishes automatically on
# every push to `main` (continuous deployment from GitHub) — so it needs no job here.
# This workflow only deploys the FastAPI service.
#
# Triggers on a version tag (`vX.Y.Z`) or manual dispatch. OPT-IN: nothing deploys until
# the repo variable DEPLOY_ENABLED == 'true' and FLY_API_TOKEN is set as a repo secret
# (see docs/GO_LIVE.md). Until then the job is skipped, so this file is inert.
#
# Required secret:
#   FLY_API_TOKEN — `fly tokens create deploy`
#
# App secrets (OPENAI_API_KEY, SUPABASE_*, …) live on the Fly app (`fly secrets set`),
# NOT here.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-service:
    name: Deploy engineering service (Fly.io)
    runs-on: ubuntu-latest
    if: vars.DEPLOY_ENABLED == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        # Builds the repo-root Dockerfile remotely on Fly and releases it. App secrets
        # are already set on the app (`fly secrets set`), so none are passed here.
        run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Verify /health
        # NOTE: update the URL if your Fly app name differs from fly.toml's default.
        run: |
          for i in $(seq 1 30); do
            if curl -fsS https://torenone-engineering-service.fly.dev/health -o /tmp/h.json; then
              break
            fi
            sleep 5
          done
          cat /tmp/h.json; echo
          grep -q '"status":"ok"' /tmp/h.json
