# Fly.io deployment for the TorenOne engineering service (FastAPI).
#
# Secrets are NEVER committed. Set them once with `fly secrets set ...`
# (OPENAI_API_KEY, SUPABASE_JWT_SECRET, SUPABASE_URL, ...) — see docs/DEPLOY.md.
# The app boots for /health without any secrets; protected routes return 503
# until the relevant secret is provided.

app = "torenone-engineering-service"
primary_region = "jnb"   # Johannesburg — closest Fly region to our Cape Town users.

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  # Zero cold start: always keep ONE machine warm so /parse and /design are instant
  # (Fly never stops below `min_machines_running`). Extra machines still auto-start under
  # load and auto-stop back down to this floor when idle, so we only pay for one always-on
  # shared-cpu-1x machine (~a few $/month) plus bursts. Bump the floor to 2 later for HA.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  # Cap concurrent requests per machine. /design opens one short-lived DB connection
  # per request (then closes it), so peak DB connections per machine <= hard_limit.
  # Keeping this small keeps total connections well under the Supabase transaction
  # pooler's limit even with several machines — see docs/DB_OPS.md. It also protects
  # the single CPU from oversubscription during the FEA + WeasyPrint run (NFR-5).
  [http_service.concurrency]
    type = "requests"
    soft_limit = 6
    hard_limit = 8

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "get"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  # PDF rendering (WeasyPrint + matplotlib + numpy/PyNite) is memory-hungry; 1 GB
  # leaves headroom for a design run (NFR-5: < 60 s on the demo case).
  memory = "1gb"
